name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout canonical gateway proto
        uses: actions/checkout@v4
        with:
          repository: polarislabxyz/obsidian-polaris
          path: obsidian-polaris
          token: ${{ secrets.POLARIS_REPO_TOKEN || github.token }}
          sparse-checkout: misc/polaris-data-gateway-proto/protos/data_gateway.proto
          sparse-checkout-cone-mode: false

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check proto mirror
        env:
          POLARIS_GATEWAY_PROTO: ${{ github.workspace }}/obsidian-polaris/misc/polaris-data-gateway-proto/protos/data_gateway.proto
        run: bash scripts/check-proto-sync.sh

      - name: TypeScript install
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: typescript
        run: pnpm typecheck

      - name: TypeScript build
        working-directory: typescript
        run: pnpm build

      - name: TypeScript examples typecheck
        working-directory: typescript
        run: pnpm typecheck:examples

      - name: Rust tests
        working-directory: rust
        run: cargo test
